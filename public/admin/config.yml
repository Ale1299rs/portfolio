                  - { label: Subtitle, name: subtitle, widget: string }
              - label: Insight
                name: insight
                widget: object
                fields:
                  - { label: Label, name: label, widget: string }
                  - { label: APAC, name: apac, widget: text }
                  - { label: EMEA, name: emea, widget: text }
                  - { label: AMER, name: amer, widget: text }
                  - { label: All, name: all, widget: text }
                  - { label: CTA, name: cta, widget: string }
              - { label: Disclaimer, name: disclaimer, widget: text }
          - label: "Projects preview"
            name: projectsPreview
            widget: object
            collapsed: true
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Title, name: title, widget: string }
