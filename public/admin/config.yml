backend:
  name: github
  repo: REPLACE_WITH/your-repo
  branch: main

local_backend: true

media_folder: public/uploads
public_folder: /uploads

publish_mode: simple

# Reusable field groups are inlined per collection for broad CMS compatibility.
collections:
  - name: ui-en
    label: "UI copy — English"
    files:
      - name: en
        label: "messages/en.json"
        file: messages/en.json
        format: json
        fields:
          - label: Site
            name: site
            widget: object
            fields:
              - { label: Role, name: role, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }
              - { label: Location, name: location, widget: string }
              - { label: Locale, name: locale, widget: string }
          - label: Nav
            name: nav
            widget: object
            collapsed: true
            fields:
              - { label: Home, name: home, widget: string }
              - { label: Work, name: work, widget: string }
              - { label: About, name: about, widget: string }
              - { label: Writing, name: writing, widget: string }
              - { label: Primary, name: primary, widget: string }
              - { label: "Mobile menu", name: mobileMenu, widget: string }
              - { label: Skip, name: skip, widget: string }
              - { label: "Brand aria label", name: brandAriaLabel, widget: string }
          - label: "Language switcher"
            name: languageSwitcher
            widget: object
            collapsed: true
            fields:
              - { label: Label, name: label, widget: string }
              - { label: "Switch to", name: switchTo, widget: string }
          - label: "Theme toggle"
            name: themeToggle
            widget: object
            collapsed: true
            fields:
              - { label: "To dark", name: toDark, widget: string }
              - { label: "To light", name: toLight, widget: string }
          - label: Hero
            name: hero
            widget: object
            fields:
              - { label: Badge, name: badge, widget: string }
              - { label: "Title — before accent", name: titleBefore, widget: string }
              - { label: "Title — accent", name: titleAccent, widget: string }
              - { label: "Title — after accent", name: titleAfter, widget: string }
              - { label: Description, name: description, widget: text }
              - { label: "CTA primary", name: ctaPrimary, widget: string }
              - { label: "CTA secondary", name: ctaSecondary, widget: string }
              - { label: Trust, name: trust, widget: string }
          - label: Services
            name: services
            widget: object
            collapsed: true
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }
              - label: Items
                name: items
                widget: list
                fields:
                  - { label: Title, name: title, widget: string }
                  - { label: Body, name: body, widget: text }
                  - { label: Outputs, name: outputs, widget: list, field: { label: Output, name: output, widget: string } }
          - label: "Dashboard demo"
            name: demo
            widget: object
            collapsed: true
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }
              - { label: "Region label", name: regionLabel, widget: string }
              - label: KPIs
                name: kpis
                widget: object
                fields:
                  - { label: "Open pipeline", name: openPipeline, widget: string }
                  - { label: "Closed won", name: closedWon, widget: string }
                  - { label: "Win rate", name: winRate, widget: string }
                  - { label: Stalled, name: stalled, widget: string }
              - label: Hints
                name: hints
                widget: object
                fields:
                  - { label: "vs prev", name: vsPrev, widget: string }
                  - { label: "vs plan", name: vsPlan, widget: string }
                  - { label: Trailing, name: trailing, widget: string }
                  - { label: "No activity", name: noActivity, widget: string }
              - label: "Chart — pipeline"
                name: chartPipeline
                widget: object
                fields:
                  - { label: Title, name: title, widget: string }
                  - { label: Subtitle, name: subtitle, widget: string }
                  - { label: "Legend pipeline", name: legendPipeline, widget: string }
