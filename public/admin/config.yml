  - name: projects
    label: Projects
    label_singular: Project
    folder: content/projects
    extension: json
    format: json
    create: true
    delete: true
    slug: "{{slug}}"
    identifier_field: slug
    summary: "{{order}} · {{en.title}}"
    sortable_fields: [order, year, slug]
    fields:
      - { label: Slug (URL), name: slug, widget: string, hint: "Lowercase, dashes only. Used in the URL." }
      - { label: Order, name: order, widget: number, value_type: int, min: 1, hint: "Lower number = shown earlier." }
      - label: Category
        name: category
        widget: select
        options:
          - Salesforce
          - Power BI
          - CRM Optimization
          - Data Quality
          - Automation
          - Process Mining
          - PowerApps
      - { label: Year, name: year, widget: string, hint: "e.g. 2024 or 2022–2023" }
      - { label: Stack, name: stack, widget: list, field: { label: Tech, name: tech, widget: string } }
      - label: Hero
        name: hero
        widget: object
        fields:
          - label: Accent gradient (Tailwind)
            name: accent
            widget: select
            default: "from-blue-500/20 via-sky-400/10 to-transparent"
            options:
              - "from-blue-500/20 via-sky-400/10 to-transparent"
              - "from-teal-500/20 via-cyan-400/10 to-transparent"
              - "from-sky-500/20 via-blue-400/10 to-transparent"
              - "from-emerald-500/20 via-teal-400/10 to-transparent"
              - "from-fuchsia-500/20 via-violet-400/10 to-transparent"
              - "from-lime-500/20 via-emerald-400/10 to-transparent"
              - "from-indigo-500/20 via-violet-400/10 to-transparent"
              - "from-rose-500/20 via-pink-400/10 to-transparent"
              - "from-amber-500/20 via-orange-400/10 to-transparent"
      - { label: Featured on homepage, name: featured, widget: boolean, default: false }
      - label: "English content"
        name: en
        widget: object
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Tagline, name: tagline, widget: text }
          - { label: Industry, name: industry, widget: string }
          - { label: Duration, name: duration, widget: string }
